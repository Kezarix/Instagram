{% load static %}
<!-- Updated to use clean Instagram-style sidebar with proper SVG icons -->
<aside class="sidebar">
    <!-- Logo -->
    <div class="sidebar-header">
        <a href="/" class="logo">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                <circle cx="12" cy="12" r="4"/>
                <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
            </svg>
            <span class="logo-text">Instagram</span>
        </a>
    </div>

    <!-- Navigation Menu -->
    <nav class="sidebar-nav">
        <a href="{% url 'posts:main_view' %}" class="nav-item {% if request.resolver_match.url_name == 'main_view' %}active{% endif %}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span class="nav-text">Главная</span>
        </a>

        <a href="{% url 'users:people_search' %}" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
            </svg>
            <span class="nav-text">Поиск</span>
        </a>

        <a href="/explore" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="1"/>
                <path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.04 17.72m2.54-15.6c3.72 4.35 8.23 5.4 16.88 5.4M19.5 13.0c1.3 1.12 3.3 2.78 4.5 4.63"/>
            </svg>
            <span class="nav-text">Интересное</span>
        </a>

        <a href="/reels" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <polygon points="23 7 16 12 23 17 23 7"/>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
            <span class="nav-text">Reels</span>
        </a>

        <a href="/messages" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="nav-text">Сообщения</span>
        </a>

        <a href="/notifications" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="nav-text">Уведомления</span>
        </a>

        <a href="{% url 'posts:create_post' %}" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span class="nav-text">Создать</span>
        </a>

        <a href="{% url 'users:profile' %}" class="nav-item {% if request.resolver_match.url_name == 'profile' %}active{% endif %}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="nav-text">Профиль</span>
        </a>
    </nav>

    <!-- Bottom Section -->
    <div class="sidebar-footer">
        <button class="menu-more">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
            <span class="nav-text">Ещё</span>
        </button>
    </div>
</aside>
